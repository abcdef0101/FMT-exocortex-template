#cloud-config
hostname: iwe-test
fqdn: iwe-test.local
timezone: UTC

# Пакеты — устанавливаются при первом boot
packages:
  - git
  - gh
  - curl
  - wget
  - ruby
  - python3
  - python3-yaml
  - shellcheck
  - expect
  - jq
  - vim
  - mc
  - tmux
  - build-essential
  - ca-certificates
  - gnupg
  - software-properties-common

# Пользователь iwe (вместо ubuntu по умолчанию)
users:
  - name: iwe
    sudo: ALL=(ALL) NOPASSWD:ALL
    shell: /bin/bash
    ssh_authorized_keys:
      - PLACEHOLDER_SSH_KEY

# Выполнить при первом boot
runcmd:
  # Node.js 20 LTS
  - curl -fsSL https://deb.nodesource.com/setup_20.x | bash -
  - apt-get install -y nodejs
  - npm install -g npm@latest

  # neovim PPA
  - add-apt-repository -y ppa:neovim-ppa/stable
  - apt-get update
  - apt-get install -y neovim

  # Директории IWE + PATH
  - mkdir -p /home/iwe/IWE /home/iwe/.config/gh /home/iwe/.local/bin /home/iwe/.opencode
  - chown -R iwe:iwe /home/iwe/IWE /home/iwe/.config /home/iwe/.local /home/iwe/.opencode
  - echo 'export PATH="$HOME/.local/bin:$HOME/.opencode/bin:$PATH"' >> /home/iwe/.bashrc

  # Готово
  - echo "IWE test VM ready. SSH: ssh iwe@$(hostname -I | awk '{print $1}')" > /etc/motd

final_message: "IWE Test VM is ready. IP: $(hostname -I)"
