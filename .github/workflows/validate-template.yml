name: Validate Template

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  markdownlint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: DavidAnson/markdownlint-cli2-action@v19
        with:
          globs: |
            **/*.md
            !**/node_modules/**
            !**/seed/**
          config: |
            {
              "default": true,
              "MD007": false,
              "MD012": false,
              "MD013": false,
              "MD022": false,
              "MD024": false,
              "MD025": false,
              "MD028": false,
              "MD029": false,
              "MD031": false,
              "MD032": false,
              "MD033": false,
              "MD036": false,
              "MD040": false,
              "MD041": false,
              "MD060": false
            }

  yamllint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install yamllint
        run: pip install yamllint

      - name: Run yamllint
        run: |
          yamllint . --strict \
            -d '{extends: relaxed, rules: {line-length: disable, document-start: disable, comments-indentation: disable}}'

  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck

      - name: Run ShellCheck on all .sh files
        run: |
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! shellcheck -S warning "$f"; then
              FAIL=1
            fi
          done < <(find . -name "*.sh" -type f -print0)
          exit $FAIL

      - name: Run bash syntax check on all .sh files
        run: |
          FAIL=0
          while IFS= read -r -d '' f; do
            if ! bash -n "$f" 2>/dev/null; then
              echo "FAIL: syntax error in $f"
              bash -n "$f"
              FAIL=1
            fi
          done < <(find . -name "*.sh" -type f -print0)
          [ "$FAIL" -eq 0 ] && echo "PASS: All .sh files pass bash -n"
          exit $FAIL

      - name: Run unit tests
        run: |
          FAIL=0
          echo "=== Full Phase 0 test suite ==="
          if ! bash scripts/test/run-phase0.sh; then
            echo "FAIL: Phase 0 tests"
            FAIL=1
          fi
          [ "$FAIL" -eq 0 ] && echo "PASS: All tests passed"
          exit $FAIL

  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Нет автор-специфичного контента
      - name: Check for author-specific content
        run: |
          FAIL=0
          for pattern in "tserentserenov" "PACK-MIM" "aist_bot_newarchitecture" "DS-Knowledge-Index-Tseren"; do
            count=$(grep -rn "$pattern" . --include="*.md" --include="*.sh" \
                    --include="*.json" --include="*.plist" --include="*.yaml" 2>/dev/null | wc -l)
            if [ "$count" -gt 0 ]; then
              echo "FAIL: Found '$pattern' in $count locations:"
              grep -rn "$pattern" . --include="*.md" --include="*.sh" \
                  --include="*.json" --include="*.plist" 2>/dev/null | head -5
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "PASS: No author-specific content"
          exit $FAIL

      # 2. Нет захардкоженных /Users/ путей
      - name: Check for hardcoded paths
        run: |
          FAIL=0
          count=$(grep -rn '/Users/' . --include="*.md" --include="*.sh" \
                  --include="*.json" --include="*.plist" 2>/dev/null | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found /Users/ in $count locations:"
            grep -rn '/Users/' . --include="*.md" --include="*.sh" 2>/dev/null | head -5
            FAIL=1
          fi

          count=$(grep -rn '/opt/homebrew' . --include="*.md" --include="*.sh" \
                  --include="*.json" --include="*.plist" 2>/dev/null \
                  | grep -v 'README.md' \
                  | grep -v 'validate-template.yml' \
                  | grep -v '/usr/local/bin.*:/opt/homebrew' \
                  | wc -l)
          if [ "$count" -gt 0 ]; then
            echo "FAIL: Found /opt/homebrew in $count locations:"
            grep -rn '/opt/homebrew' . --include="*.md" --include="*.sh" 2>/dev/null \
                | grep -v 'README.md' | grep -v 'validate-template.yml' | head -5
            FAIL=1
          fi

          [ "$FAIL" -eq 0 ] && echo "PASS: No hardcoded paths"
          exit $FAIL

      # 3. MEMORY.md — скелет
      - name: Check MEMORY.md is skeleton
        run: |
          if [ -f "seed/MEMORY.md" ]; then
            rows=$(grep -c '^|' seed/MEMORY.md 2>/dev/null || echo 0)
            if [ "$rows" -gt 15 ]; then
              echo "FAIL: seed/MEMORY.md has $rows table rows (expected ≤15)"
              exit 1
            fi
            echo "PASS: seed/MEMORY.md is skeleton ($rows rows)"
          else
            echo "WARN: seed/MEMORY.md not found"
          fi

      # 4. Обязательные файлы (ADR-004: persistent-memory is template source-of-truth)
      - name: Check required files
        run: |
          FAIL=0
          for f in CLAUDE.md ONTOLOGY.md README.md \
                   seed/MEMORY.md \
                   persistent-memory/hard-distinctions.md \
                   persistent-memory/roles.md \
                   roles/strategist/scripts/strategist.sh; do
            if [ ! -f "$f" ]; then
              echo "MISSING: $f"
              FAIL=1
            fi
          done
          [ "$FAIL" -eq 0 ] && echo "PASS: All required files present"
          exit $FAIL

      # 5. MCP — серверы подключаются через claude.ai/settings/connectors (не локально)
      - name: Check MCP documentation
        run: |
          # MCP Gateway (iwe-knowledge at mcp.aisystant.com/mcp) is managed through claude.ai connectors
          # Validate that setup.sh contains instructions for users
          if grep -q "claude.ai/settings/connectors" setup.sh; then
            echo "PASS: setup.sh contains MCP connector instructions"
          else
            echo "FAIL: setup.sh missing MCP connector instructions"
            exit 1
          fi

      # 6. Только допустимые placeholders
      - name: Check placeholders are valid
        run: |
          # Найти все {{...}} и проверить что они из допустимого списка
          ALLOWED="HOME_DIR|WORKSPACE_DIR|GITHUB_USER|CLAUDE_PATH|CLAUDE_PROJECT_SLUG|TIMEZONE_HOUR|TIMEZONE_DESC"
          INVALID=$(grep -rohP '\{\{[A-Z_]+\}\}' . --include="*.md" --include="*.sh" \
                    --include="*.json" --include="*.plist" 2>/dev/null \
                    | sort -u \
                    | grep -vP "\{\{($ALLOWED)\}\}" || true)
          if [ -n "$INVALID" ]; then
            echo "WARN: Unknown placeholders found:"
            echo "$INVALID"
            echo "(This is a warning, not a failure — new placeholders may be intentional)"
          else
            echo "PASS: All placeholders are valid"
          fi

      # 7. Semver enforcement + contract checks (ADR-005 Phase 4)
      - name: Semver enforcement
        run: |
          echo "=== Semver & Contract Enforcement ==="
          bash scripts/enforce-semver.sh
