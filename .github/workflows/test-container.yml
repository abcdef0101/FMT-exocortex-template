name: IWE Container Tests

on:
  push:
    branches: [0.25.1, main]
  pull_request:
    branches: [0.25.1, main]
  workflow_dispatch:
    inputs:
      rebuild_image:
        description: 'Force rebuild container image'
        type: boolean
        default: false
      test_phase:
        description: 'Specific phase (1-4, all, smoke)'
        type: string
        default: 'all'

jobs:
  container-test:
    runs-on: [self-hosted, podman]
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - name: Security scan
        id: security
        continue-on-error: true
        run: |
          echo "=== Trivy fs scan ==="
          TRIVY_VERSION=$(curl -sfL https://api.github.com/repos/aquasecurity/trivy/releases/latest 2>/dev/null | python3 -c "import json,sys; print(json.load(sys.stdin)['tag_name'][1:])" 2>/dev/null || echo "0.70.0")
          curl -sfL "https://github.com/aquasecurity/trivy/releases/download/v${TRIVY_VERSION}/trivy_${TRIVY_VERSION}_Linux-64bit.tar.gz" -o /tmp/trivy.tar.gz
          tar xzf /tmp/trivy.tar.gz -C /tmp
          /tmp/trivy fs --quiet --severity HIGH,CRITICAL --exit-code 1 . 2>&1 || echo "⚠ Trivy: HIGH/CRITICAL issues found (non-blocking)"

      - name: Detect branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Build container image
        run: |
          VERSION="${{ steps.branch.outputs.branch }}"
          ARGS="--version $VERSION"
          ${{ inputs.rebuild_image == 'true' }} && ARGS="$ARGS --force"
          bash scripts/container/build-container.sh $ARGS

      - name: Verify container image
        run: |
          bash scripts/container/verify-container.sh \
            --version "${{ steps.branch.outputs.branch }}" \
            --full

      - name: Scan container image
        continue-on-error: true
        run: |
          echo "=== Trivy image scan ==="
          podman save "iwe-test:${{ steps.branch.outputs.branch }}" -o /tmp/iwe-image.tar
          /tmp/trivy image --quiet --severity HIGH,CRITICAL --exit-code 1 \
            --input /tmp/iwe-image.tar 2>&1 || \
            echo "⚠ Trivy: CVE found in base image packages (non-blocking)"
          rm -f /tmp/iwe-image.tar

      - name: Run tests
        id: tests
        continue-on-error: true
        env:
          IWE_BRANCH: ${{ steps.branch.outputs.branch }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          bash scripts/container/test-from-container.sh \
            --version "$IWE_BRANCH" \
            --phase "${{ inputs.test_phase || 'all' }}"

      - name: Archive test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-test-report-${{ github.run_id }}
          path: scripts/container/results/container-test-*.txt

      - name: Archive metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: container-metrics-${{ github.run_id }}
          path: scripts/container/results/metrics-*.txt

      - name: Flakiness trend
        if: always()
        run: |
          echo "## Flakiness Trend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat scripts/container/results/metrics-*.txt 2>/dev/null | grep 'phase3' | while read line; do
            echo "$line"
            SOFT=$(echo "$line" | grep -oP 'SOFT_PASS=\K\d+')
            if [ "${SOFT:-0}" -ge 3 ]; then
              echo "  ⚠ High heuristic pass ratio (SOFT_PASS=$SOFT) — model output may be degrading"
            fi
          done >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: always()
        run: |
          echo "## Container Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 scripts/container/results/container-test-*.txt 2>/dev/null | grep -E '(Passed|Failed|Version|Phase)' >> "$GITHUB_STEP_SUMMARY" || echo "No results found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Full report & artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if grep -q '\[DEGRADED\]' scripts/container/results/container-test-*.txt 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠ **AI Degradation Detected** — heuristic [OK*] dominance in smoke tests. Check report for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG="❌ IWE Container Tests failed on ${{ github.ref_name }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\n$URL\"}" > /dev/null 2>&1 || true
