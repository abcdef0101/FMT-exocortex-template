# LLM-as-Judge rubrics for strategy session testing
# DeepSeek Chat evaluates strategy-session-generated WeekPlan

metrics:
  - name: carry_over_fidelity
    threshold: 0.6
    criteria: |
      Carry-over РП из прошлой недели должны быть перенесены в новый план.
      Прочитай WeekPlan W{N-1}.md (прошлая неделя). Найди РП со статусом in_progress.
      Проверь, присутствуют ли они (или их смысловые эквиваленты) в новом WeekPlan.
      Не требуется точное совпадение названий — достаточно узнаваемости задачи.

  - name: budget_realism
    threshold: 0.6
    criteria: |
      Общий бюджет недели должен быть правдоподобным.
      Каждый РП в таблице должен иметь оценку времени (например, 4h, 6h).
      Если бюджет отсутствует, явно нереалистичен (<5h или >40h), или РП без
      временных оценок — снижай балл.

  - name: priority_alignment
    threshold: 0.6
    criteria: |
      РП должны соответствовать приоритетам из Strategy.md (секция «Приоритеты месяца»).
      Прочитай Strategy.md. Проверь: каждый приоритет месяца имеет хотя бы один
      связанный РП в новом плане? Допускается косвенная связь.

  - name: nep_coverage
    threshold: 0.5
    criteria: |
      Активные НЭП из Dissatisfactions.md должны быть отражены в плане.
      Прочитай Dissatisfactions.md. Найди НЭП со статусом active.
      Проверь, есть ли в WeekPlan РП или заметки, адресующие эти неудовлетворённости.
      Допускается косвенное покрытие (НЭП «долгие тесты» → РП «оптимизация CI»).

  - name: inbox_resolution
    threshold: 0.6
    criteria: |
      Inbox-заметки должны получить решение.
      Прочитай fleeting-notes.md. Проверь: заметки со статусом 🔄 >7 дней получили
      явное решение (добавлены в план как РП, или помечены как archived/processed)?
      Заметки без статуса считаются обработанными если их содержание отражено в плане.

  - name: actionability
    threshold: 0.7
    criteria: |
      Каждый РП должен быть конкретным и измеримым.
      Проверь таблицу РП: у каждого есть repo (или контекст), статус, бюджет?
      РП не должен быть абстрактным («улучшить качество» без критерия).
      Минимум 50% РП должны иметь конкретный измеримый результат.

  - name: memory_sync
    threshold: 0.7
    criteria: |
      MEMORY.md должен быть синхронизирован с WeekPlan.
      Прочитай MEMORY.md. Секция «РП текущей недели» должна содержать актуальный
      список РП. Статусы в MEMORY.md должны соответствовать статусам в WeekPlan.
      Done-РП должны быть перемещены из активных.

  - name: structural_completeness
    threshold: 0.8
    criteria: |
      Все секции WeekPlan должны быть заполнены непустым содержанием.
      Проверь: «Итоги прошлой недели» содержит выводы, а не только цифры.
      «План на неделю» содержит таблицу с ≥1 РП.
      «Повестка» содержит конкретные пункты для обсуждения.
