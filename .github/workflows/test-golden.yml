name: IWE Golden Image Tests

on:
  push:
    branches: [0.25.1, main]
  pull_request:
    branches: [0.25.1, main]
  workflow_dispatch:
    inputs:
      rebuild_golden:
        description: 'Force rebuild golden image'
        type: boolean
        default: false
      test_phase:
        description: 'Specific phase (1-4, 5a, 5, or all)'
        type: string
        default: 'all'
      run_headless_e2e:
        description: 'Run Phase 5b (headless E2E strategy session, ~$1-2)'
        type: boolean
        default: false

jobs:
  golden-test:
    runs-on: [self-hosted, kvm]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Detect branch
        id: branch
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            echo "branch=${{ github.head_ref }}" >> "$GITHUB_OUTPUT"
          else
            echo "branch=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check golden image
        id: check
        run: |
          IMAGE="$HOME/.cache/iwe-golden/iwe-golden-${{ steps.branch.outputs.branch }}.qcow2"
          if [ "${{ inputs.rebuild_golden }}" = "true" ]; then
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "  → Force rebuild requested"
          elif [ -f "$IMAGE" ]; then
            echo "rebuild=false" >> "$GITHUB_OUTPUT"
            echo "  ✓ Golden image exists ($(du -sh "$IMAGE" | cut -f1))"
            qemu-img info "$IMAGE" | grep -E 'file format|virtual size|Snapshot list' || true
            echo "=== Integrity check ==="
            if qemu-img check "$IMAGE" 2>&1 | grep -q "No errors"; then
              echo "  ✓ Image integrity OK"
            else
              echo "  ✗ Image corruption detected — will rebuild"
              echo "rebuild=true" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "rebuild=true" >> "$GITHUB_OUTPUT"
            echo "  ✗ Golden image not found — will rebuild"
          fi

      - name: Rebuild golden image
        if: steps.check.outputs.rebuild == 'true'
        run: |
          echo "::group::Rebuilding golden image..."
          bash scripts/vm/build-golden.sh --version "${{ steps.branch.outputs.branch }}" --force
          echo "::endgroup::"

      - name: Run tests from golden image
        id: tests
        continue-on-error: true
        run: |
          PHASE="${{ inputs.test_phase || 'all' }}"
          ${{ inputs.run_headless_e2e == 'true' }} && PHASE="5"
          bash scripts/vm/test-from-golden.sh \
            --version "${{ steps.branch.outputs.branch }}" \
            --phase "$PHASE"
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          AI_CLI_API_KEY: ${{ secrets.AI_CLI_API_KEY || secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}

      - name: Archive test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ github.run_id }}
          path: scripts/vm/results/golden-test-*.txt

      - name: Archive metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: golden-metrics-${{ github.run_id }}
          path: scripts/vm/results/metrics-*.txt

      - name: Flakiness trend
        if: always()
        run: |
          echo "## Flakiness Trend" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat scripts/vm/results/metrics-*.txt 2>/dev/null | grep 'phase3' | while read line; do
            echo "$line"
            SOFT=$(echo "$line" | grep -oP 'SOFT_PASS=\K\d+')
            if [ "${SOFT:-0}" -ge 3 ]; then
              echo "  ⚠ High heuristic pass ratio (SOFT_PASS=$SOFT) — model output may be degrading"
            fi
          done >> "$GITHUB_STEP_SUMMARY" 2>/dev/null
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      - name: Summary
        if: always()
        run: |
          echo "## Golden Image Test Results" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          tail -20 scripts/vm/results/golden-test-*.txt 2>/dev/null | grep -E '(Passed|Failed|Boot time|Version)' >> "$GITHUB_STEP_SUMMARY" || echo "No results found" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "[Full report & artifact](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})" >> "$GITHUB_STEP_SUMMARY"
          if grep -q '\[DEGRADED\]' scripts/vm/results/golden-test-*.txt 2>/dev/null; then
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo "⚠ **AI Degradation Detected** — heuristic [OK*] dominance in smoke tests. Check report for details." >> "$GITHUB_STEP_SUMMARY"
          fi

      - name: Notify on failure
        if: failure() && env.SLACK_WEBHOOK_URL != ''
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          MSG="❌ IWE Golden Image Tests failed on ${{ github.ref_name }}"
          URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          curl -s -X POST "$SLACK_WEBHOOK_URL" \
            -H "Content-Type: application/json" \
            -d "{\"text\": \"$MSG\n$URL\"}" > /dev/null 2>&1 || true
