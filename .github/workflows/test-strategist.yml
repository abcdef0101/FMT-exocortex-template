name: Test strategist role

on:
  push:
    paths:
      - 'roles/strategist/**'
  pull_request:
    paths:
      - 'roles/strategist/**'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install bats-core
        run: npm install -g bats

      - name: Install bats helpers
        run: |
          mkdir -p roles/strategist/tests/test_helper
          git clone --depth=1 https://github.com/bats-core/bats-support roles/strategist/tests/test_helper/bats-support
          git clone --depth=1 https://github.com/bats-core/bats-assert  roles/strategist/tests/test_helper/bats-assert
          git clone --depth=1 https://github.com/bats-core/bats-file    roles/strategist/tests/test_helper/bats-file

      - name: Syntax check
        run: |
          for f in roles/strategist/scripts/*.sh; do
            bash -n "$f" || { echo "SYNTAX ERROR: $f" >&2; exit 1; }
          done

      - name: Lint scripts
        run: |
          sudo apt-get install -y shellcheck
          shellcheck roles/strategist/scripts/*.sh

      - name: Run tests
        run: bats roles/strategist/tests/*.bats
