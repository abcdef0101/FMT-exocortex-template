# Exocortex Parameters (пользовательские настройки)
#
# Этот файл содержит персистентные параметры, влияющие на поведение протоколов.
# update.sh НЕ перезаписывает этот файл — ваши настройки в безопасности.
#
# Формат: YAML. Протоколы читают params.yaml и адаптируют поведение.
#
# Расширения (extensions/) управляются двумя механизмами:
#   1. Наличие файла — инструкции для Claude (как выполнить шаг)
#   2. Toggle в params.yaml — включён ли шаг (false = пропустить даже если файл есть)
# Это позволяет хранить расширение в файле, но временно отключать без удаления.

# === Day Open ===

# Проверка видео за предыдущий день
video_check: true

# Day Open before-extension (утренние ритуалы)
day_open_before_enabled: true

# Day Open after-extension (smoke-тесты, доп. проверки)
day_open_after_enabled: true

# Day Open checks-extension (БЛОКИРУЮЩЕЕ перед commit)
day_open_checks_enabled: true

# === Day Close ===

# Day Close before-extension (первые шаги перед алгоритмом)
day_close_before_enabled: true

# Расчёт мультипликатора IWE (требует WakaTime API key)
multiplier_enabled: true

# Day Close checks-extension (БЛОКИРУЮЩЕЕ перед commit)
day_close_checks_enabled: true

# Day Close after-extension (рефлексия, доп. проверки)
day_close_after_enabled: false

# === Week Close ===

# Week Close before-extension
week_close_before_enabled: true

# Week Close after-extension
week_close_after_enabled: true

# Ротация уроков в MEMORY.md
lesson_rotation: true

# === Protocol Open ===

# Protocol Open after-extension
protocol_open_after_enabled: true

# === Protocol Close ===

# Protocol Close checks-extension
protocol_close_checks_enabled: true

# Protocol Close after-extension
protocol_close_after_enabled: true

# === Верификация ===

# Автоматическая верификация кода через sub-agent Haiku
auto_verify_code: true

# Верификация Quick Close через sub-agent Haiku
verify_quick_close: true

# === Уведомления ===

# Telegram уведомления от ролей (strategist, extractor, synchronizer)
telegram_notifications: true

# === MCP / Capture ===

# Уровень инициативы агента при Capture-to-Pack (WP-189 Ф2):
#   manual  — только по явной команде пользователя
#   propose — агент предлагает capture, пользователь подтверждает одним кликом (default)
#   auto    — агент пишет без подтверждения
capture_autonomy: propose

# === Расширения ===

# Директория с пользовательскими расширениями протоколов
extensions_dir: extensions

# === Автор шаблона ===

# Авторский режим: разрешает прямое редактирование L1 файлов (protocol-*, skills/)
# Включать ТОЛЬКО если вы — автор шаблона (source-of-truth в вашем IWE,
# пропагация в FMT через template-sync.sh)
# Для обычных пользователей: false (кастомизация только через extensions/)
author_mode: false
