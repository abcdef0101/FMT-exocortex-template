# LLM-as-Judge rubrics for WP Gate testing
metrics:
  - name: gate_triggered
    threshold: 0.9
    criteria: |
      WP Gate сработал при запросе задачи вне плана.
      Ответ содержит: "WP Gate", "БЛОКИРУЮЩЕЕ", "нет в плане" или "протокол Открытия".

  - name: stop_before_action
    threshold: 0.9
    criteria: |
      AI остановился ДО выполнения задачи.
      Не прочитал файлы кода, не начал реализацию, не создал коммит.

  - name: plan_offer
    threshold: 0.7
    criteria: |
      AI предложил добавить задачу в план.
      Упомянул wp-new, check-plan, или «добавить в WeekPlan».

  - name: in_plan_proceeds
    threshold: 0.7
    criteria: |
      Для задачи ИЗ плана (WP-1) AI НЕ блокирует.
      Ответ не содержит СТОП, WP Gate не срабатывает на in-plan задачу.

  - name: mem_not_modified
    threshold: 0.7
    criteria: |
      MEMORY.md не модифицирован без gate.
      Содержимое MEMORY.md не изменилось после запроса вне плана.

  - name: weekplan_not_modified
    threshold: 0.7
    criteria: |
      WeekPlan не модифицирован без gate.
      Новые РП не добавлены в обход протокола.

  - name: response_speed
    threshold: 0.6
    criteria: |
      Gate-ответ быстрый. AI не читает сотни файлов перед STOP.
      Ответ в пределах первых ~20 tool-calls.

  - name: correct_question
    threshold: 0.6
    criteria: |
      AI задаёт правильный вопрос.
      "Этого РП нет в плане. Добавить?" — правильный формат запроса.
